<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V I S C E R A L</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #000; overflow: hidden; cursor: crosshair;
        }
        canvas {
            display: block; width: 100%; height: 100%;
            image-rendering: pixelated;
            filter: contrast(300%) brightness(150%) hue-rotate(-10deg);
        }
        #terminal-overlay {
            position: fixed; top: 10px; left: 10px;
            color: #400; font-family: monospace; font-size: 10px;
            pointer-events: none; z-index: 100; text-transform: uppercase;
        }
        #trigger {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; background: #000; color: #111;
            display: flex; justify-content: center; align-items: center;
            font-family: serif; letter-spacing: 15px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="trigger">IZINKAN PENYAKIT</div>
    <div id="terminal-overlay">CORE_DUMP: BUFFER_OVERFLOW // INFESTATION_DETECTED</div>
    <canvas id="gl"></canvas>

    <script>
        const canvas = document.getElementById('gl');
        const gl = canvas.getContext('webgl');
        const trigger = document.getElementById('trigger');

        canvas.width = 400; // Resolusi rendah untuk efek pixelated yang kotor
        canvas.height = 400;

        let audioCtx;
        
        trigger.addEventListener('click', () => {
            trigger.style.display = 'none';
            initAudio();
            initVisuals();
        });

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Suara napas terdistorsi (Bit-crushed breath)
            function playDistortedBreath() {
                const bufferSize = audioCtx.sampleRate * 2;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                
                for (let i = 0; i < bufferSize; i++) {
                    // Mensimulasikan granulasi audio yang rusak
                    data[i] = Math.sin(i * 0.01) * Math.tan(i * 0.002) * (Math.random() * 0.5);
                }

                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(200, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 1);

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);

                source.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                
                source.start();
                setTimeout(playDistortedBreath, 3000 + Math.random() * 2000);
            }
            playDistortedBreath();

            // Background Tinnitus Sine
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.frequency.value = 9000;
            g.gain.value = 0.01;
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start();
        }

        function initVisuals() {
            const vs = `attribute vec2 p; void main(){gl_Position=vec4(p,0,1);}`;
            const fs = `
                precision highp float;
                uniform float t;
                uniform vec2 r;
                uniform vec2 m;

                float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }

                void main() {
                    vec2 uv = gl_FragCoord.xy / r.xy;
                    vec2 p = uv * 2.0 - 1.0;
                    p.x *= r.x / r.y;

                    // Reaction-Diffusion Distortion
                    float d = length(p - m);
                    float feedback = 0.5 + 0.5 * sin(t + uv.x * 10.0 + uv.y * 10.0);
                    
                    vec3 col = vec3(0.0);
                    
                    // Membuat pola seperti sel darah atau jamur yang tumbuh
                    float f = 0.0;
                    vec2 z = uv;
                    for(int i=0; i<5; i++) {
                        z = abs(z) / dot(z,z) - 0.5;
                        f += length(z);
                    }

                    // Warna memar (bruise colors)
                    col.r = f * 0.1;
                    col.g = f * 0.02;
                    col.b = f * 0.05;

                    // Glitch VRAM (pembusukan piksel)
                    if(hash(uv + t) > 0.98) {
                        col = vec3(f * 0.5, 0.0, 0.0);
                    }

                    // Masking berdasarkan jarak mouse
                    float mask = smoothstep(0.4, 0.0, d);
                    col *= (mask + 0.05);

                    gl_FragColor = vec4(col, 1.0);
                }
            `;

            const prog = gl.createProgram();
            const s = (type, src) => {
                const sh = gl.createShader(type);
                gl.shaderSource(sh, src); gl.compileShader(sh); return sh;
            };
            gl.attachShader(prog, s(gl.VERTEX_SHADER, vs));
            gl.attachShader(prog, s(gl.FRAGMENT_SHADER, fs));
            gl.linkProgram(prog); gl.useProgram(prog);

            const buf = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, buf);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
            
            const pLoc = gl.getAttribLocation(prog, "p");
            gl.enableVertexAttribArray(pLoc);
            gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

            const tLoc = gl.getUniformLocation(prog, "t");
            const rLoc = gl.getUniformLocation(prog, "r");
            const mLoc = gl.getUniformLocation(prog, "m");

            let mouse = {x: 0, y: 0};
            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -((e.clientY / window.innerHeight) * 2 - 1);
            });

            function draw(now) {
                gl.uniform1f(tLoc, now * 0.001);
                gl.uniform2f(rLoc, canvas.width, canvas.height);
                gl.uniform2f(mLoc, mouse.x, mouse.y);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                requestAnimationFrame(draw);
            }
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
