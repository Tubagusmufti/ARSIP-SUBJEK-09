<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P A R A S I T</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #030303; overflow: hidden;
            cursor: none !important; /* Kursor asli dimatikan secara absolut */
            user-select: none;
        }

        #init-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000; color: #444; font-family: 'Courier New', monospace;
            z-index: 1000; letter-spacing: 5px; text-transform: uppercase;
        }

        /* Replica Kursor */
        .cursor-clone {
            position: absolute; width: 18px; height: 24px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 24"><path d="M0,0 L18,18 L10,18 L13,24 L9,24 L6,18 L0,24 Z" fill="%23ffffff" stroke="%23000000" stroke-width="1"/></svg>') no-repeat;
            pointer-events: none; transform-origin: top left;
            z-index: 100;
        }

        .cursor-main {
            z-index: 500; filter: drop-shadow(0 0 2px red);
        }

        #glitch-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: red; mix-blend-mode: color-burn; opacity: 0;
            pointer-events: none; z-index: 900;
        }

        #message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #220000; font-family: 'Courier New', monospace; font-size: 2rem;
            font-weight: bold; opacity: 0; white-space: nowrap; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="init-screen">SINKRONISASI KONTROL MOTORIK - KLIK AREA MANA SAJA</div>
    <div id="message">MEREKA MENCARI INANG BARU</div>
    <div id="glitch-overlay"></div>

    <script>
        const initScreen = document.getElementById('init-screen');
        const glitchOverlay = document.getElementById('glitch-overlay');
        const messageDiv = document.getElementById('message');
        
        let audioCtx;
        let mainCursor;
        const swarm = [];
        const SWARM_SIZE = 300;
        
        // State Machine
        let mode = 'FOLLOW'; // FOLLOW -> RESIST -> MULTIPLY -> SWARM -> ATTACK
        let realMouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let fakeMouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let timeElapsed = 0;

        initScreen.addEventListener('click', () => {
            initScreen.style.display = 'none';
            initAudio();
            createMainCursor();
            requestAnimationFrame(engine);
        });

        document.addEventListener('mousemove', (e) => {
            realMouse.x = e.clientX;
            realMouse.y = e.clientY;
        });

        function createMainCursor() {
            mainCursor = document.createElement('div');
            mainCursor.className = 'cursor-clone cursor-main';
            document.body.appendChild(mainCursor);
        }

        function createSwarmEntity(startX, startY) {
            const el = document.createElement('div');
            el.className = 'cursor-clone';
            document.body.appendChild(el);
            
            swarm.push({
                el: el,
                x: startX,
                y: startY,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                angle: 0
            });
        }

        // Audio: Skittering/Scratching (Mensimulasikan suara serangga merayap di dalam monitor)
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Tinnitus Drone
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 14000; // Frekuensi yang sangat tidak nyaman
            gain.gain.value = 0.001;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();

            setInterval(() => {
                if (mode === 'MULTIPLY' || mode === 'SWARM') {
                    gain.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 1);
                } else if (mode === 'ATTACK') {
                    gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.1);
                }
            }, 1000);
        }

        function playSkitter() {
            if(!audioCtx || Math.random() > 0.3) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // Noise burst pendek
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(4000 + Math.random() * 4000, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.05);
            
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function engine() {
            timeElapsed += 0.016; // Asumsi 60FPS

            if (mode === 'FOLLOW') {
                // Kursor mengikuti dengan sempurna
                fakeMouse.x = realMouse.x;
                fakeMouse.y = realMouse.y;
                
                if (timeElapsed > 4) mode = 'RESIST';
            } 
            else if (mode === 'RESIST') {
                // Kursor mulai melawan, bergerak lebih lambat dan bergetar
                fakeMouse.x += (realMouse.x - fakeMouse.x) * 0.05 + (Math.random() - 0.5) * 5;
                fakeMouse.y += (realMouse.y - fakeMouse.y) * 0.05 + (Math.random() - 0.5) * 5;
                
                if (timeElapsed > 8) {
                    mode = 'MULTIPLY';
                    messageDiv.style.opacity = '1';
                }
            }
            else if (mode === 'MULTIPLY') {
                // Kursor diam, menolak perintah, mulai membelah diri
                fakeMouse.x += (Math.random() - 0.5) * 2;
                fakeMouse.y += (Math.random() - 0.5) * 2;
                
                if (swarm.length < SWARM_SIZE && Math.random() > 0.5) {
                    createSwarmEntity(fakeMouse.x, fakeMouse.y);
                    playSkitter();
                }

                if (swarm.length >= SWARM_SIZE) {
                    mode = 'SWARM';
                    timeElapsed = 0; // Reset timer untuk fase swarm
                }
            }

            // Update posisi Kursor Utama
            mainCursor.style.left = fakeMouse.x + 'px';
            mainCursor.style.top = fakeMouse.y + 'px';

            // Logika Kawanan (Swarm)
            if (mode === 'SWARM' || mode === 'ATTACK') {
                messageDiv.style.opacity = '0';
                
                if (mode === 'SWARM' && timeElapsed > 5) {
                    mode = 'ATTACK';
                    // Layar berkedip merah statis
                    glitchOverlay.style.opacity = '0.3';
                }

                swarm.forEach(bug => {
                    if (mode === 'SWARM') {
                        // Merayap acak seperti serangga mencari jalan
                        bug.vx += (Math.random() - 0.5) * 2;
                        bug.vy += (Math.random() - 0.5) * 2;
                        
                        // Limit kecepatan
                        bug.vx *= 0.9; bug.vy *= 0.9;
                    } else if (mode === 'ATTACK') {
                        // Semua kursor berbalik dan menargetkan posisi mouse asli pengguna secara agresif
                        const dx = realMouse.x - bug.x;
                        const dy = realMouse.y - bug.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if (dist > 5) {
                            bug.vx += (dx / dist) * 2;
                            bug.vy += (dy / dist) * 2;
                        }
                        
                        // Limit kecepatan tinggi
                        bug.vx *= 0.95; bug.vy *= 0.95;
                        playSkitter();
                    }

                    bug.x += bug.vx;
                    bug.y += bug.vy;
                    
                    // Hitung sudut rotasi SVG agar kursor menunjuk ke arah bergeraknya
                    bug.angle = Math.atan2(bug.vy, bug.vx) * (180 / Math.PI) + 90;

                    bug.el.style.left = bug.x + 'px';
                    bug.el.style.top = bug.y + 'px';
                    bug.el.style.transform = `rotate(${bug.angle}deg)`;
                });

                // Pemadaman Total jika diserang
                if (mode === 'ATTACK' && timeElapsed > 8) {
                    document.body.style.backgroundColor = '#000';
                    mainCursor.style.display = 'none';
                    swarm.forEach(b => b.el.style.display = 'none');
                    glitchOverlay.style.background = 'black';
                    glitchOverlay.style.opacity = '1';
                    
                    // Dentuman keras
                    const osc = audioCtx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(50, audioCtx.currentTime);
                    osc.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.5);
                    
                    return; // Hentikan loop animasi
                }
            }

            requestAnimationFrame(engine);
        }
    </script>
</body>
</html>
