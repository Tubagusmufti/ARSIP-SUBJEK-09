<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S Y N C</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #000; overflow: hidden; cursor: none;
            display: flex; justify-content: center; align-items: center;
        }

        #eye-target {
            width: 5px; height: 5px; background: #f00;
            border-radius: 50%; position: absolute;
            box-shadow: 0 0 10px #f00; z-index: 100;
        }

        #ambient-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; filter: blur(50px) brightness(0.2);
            pointer-events: none;
        }

        #static-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 200; pointer-events: none; opacity: 0.05;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23n)"/></svg>');
        }

        #init {
            position: fixed; z-index: 1000; color: #110000;
            font-family: serif; letter-spacing: 15px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="init">SAMBUNGKAN</div>
    <div id="eye-target"></div>
    <div id="static-overlay"></div>
    <canvas id="ambient-canvas"></canvas>

    <script>
        const target = document.getElementById('eye-target');
        const canvas = document.getElementById('ambient-canvas');
        const ctx = canvas.getContext('2d');
        const init = document.getElementById('init');

        let audioCtx, masterGain, lowOsc;
        let angle = 0;
        let isRunning = false;

        init.addEventListener('click', () => {
            init.style.display = 'none';
            initAudio();
            isRunning = true;
            loop();
        });

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);

            // Infrasound "Aritmia" (Detak jantung yang salah)
            lowOsc = audioCtx.createOscillator();
            lowOsc.type = 'sine';
            lowOsc.frequency.value = 18; // Ambang batas infrasonik
            
            const lowGain = audioCtx.createGain();
            lowGain.gain.value = 0.8;
            
            lowOsc.connect(lowGain);
            lowGain.connect(masterGain);
            lowOsc.start();

            // Irama denyut yang tidak konsisten (Gaslighting detak jantung)
            function pulse() {
                if(!isRunning) return;
                const heartGain = audioCtx.createGain();
                const heartOsc = audioCtx.createOscillator();
                
                heartOsc.frequency.setValueAtTime(50, audioCtx.currentTime);
                heartOsc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
                
                heartGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                heartGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                
                heartOsc.connect(heartGain);
                heartGain.connect(masterGain);
                
                heartOsc.start();
                heartOsc.stop(audioCtx.currentTime + 0.1);

                // Variabel interval untuk menciptakan rasa cemas
                setTimeout(pulse, 600 + Math.random() * 800);
            }
            pulse();
        }

        function loop() {
            if(!isRunning) return;

            // Titik merah bergerak dalam pola "Lissajous" yang sangat lambat
            angle += 0.01;
            const x = Math.sin(angle * 0.5) * (window.innerWidth * 0.3) + (window.innerWidth * 0.5);
            const y = Math.cos(angle * 0.3) * (window.innerHeight * 0.3) + (window.innerHeight * 0.5);
            
            target.style.left = x + 'px';
            target.style.top = y + 'px';

            // Visual kabur di latar belakang (seperti pergerakan di balik tirai)
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = Math.random() > 0.98 ? '#100' : '#000';
            ctx.beginPath();
            ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 50, 0, Math.PI*2);
            ctx.fill();

            // KLIMAKS: Berhenti tiba-tiba setelah waktu acak
            if (angle > 15) { // Sekitar 30-40 detik
                isRunning = false;
                triggerTheVoid();
                return;
            }

            requestAnimationFrame(loop);
        }

        function triggerTheVoid() {
            // Matikan semua audio dan visual
            target.style.display = 'none';
            audioCtx.close();
            document.body.style.backgroundColor = '#000';
            
            // Suara klik mekanis tunggal (suara saklar mati)
            const clickCtx = new (window.AudioContext || window.webkitAudioContext)();
            const o = clickCtx.createOscillator();
            const g = clickCtx.createGain();
            o.type = 'square';
            o.frequency.value = 100;
            g.gain.setValueAtTime(0.1, clickCtx.currentTime);
            g.gain.linearRampToValueAtTime(0, clickCtx.currentTime + 0.01);
            o.connect(g); g.connect(clickCtx.destination);
            o.start(); o.stop(clickCtx.currentTime + 0.01);

            // Sekarang, pengguna hanya menatap layar hitam dalam keheningan.
            // Di titik ini, otak akan mulai berhalusinasi.
            setTimeout(() => {
                // Satu bisikan visual terakhir (Subliminal)
                document.body.innerHTML = "<div style='color:#050000; font-family:serif; display:flex; justify-content:center; align-items:center; height:100vh; font-size:10px;'>KAU TIDAK SENDIRIAN</div>";
            }, 5000);
        }
    </script>
</body>
</html>
