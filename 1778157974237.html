<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X X X</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #000; overflow: hidden; cursor: none;
        }
        canvas {
            display: block; width: 100%; height: 100%;
            filter: contrast(1000%) brightness(40%) grayscale(100%);
        }
        #terminal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000; color: #080000; z-index: 9999;
            font-family: serif; letter-spacing: 20px; cursor: pointer;
        }
        #glitch-msg {
            position: fixed; bottom: 10%; width: 100%; text-align: center;
            color: #100; font-family: monospace; font-size: 10px; opacity: 0.5;
        }
    </style>
</head>
<body>

    <div id="terminal-overlay">HILANGKAN DIRI</div>
    <div id="glitch-msg">SIGNAL_LOSS // MEMORY_CORRUPTION_V.99</div>
    <canvas id="abyss"></canvas>

    <script>
        const canvas = document.getElementById('abyss');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('terminal-overlay');

        canvas.width = window.innerWidth / 4;
        canvas.height = window.innerHeight / 4;

        let audioCtx, masterGain;
        let mX = canvas.width / 2, mY = canvas.height / 2;
        let pX = mX, pY = mY;
        let active = false;
        let timer = 0;

        overlay.addEventListener('click', () => {
            overlay.style.display = 'none';
            initAudio();
            active = true;
            render();
        });

        document.addEventListener('mousemove', (e) => {
            mX = e.clientX / 4;
            mY = e.clientY / 4;
        });

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);

            // Shepard Tone Generator (Endless Fall)
            const createDrone = (freq, offset) => {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.frequency.value = freq;
                g.gain.value = 0;
                osc.connect(g); g.connect(masterGain);
                osc.start();

                const sweep = () => {
                    const now = audioCtx.currentTime;
                    osc.frequency.setValueAtTime(freq, now);
                    osc.frequency.exponentialRampToValueAtTime(freq / 2, now + 10);
                    g.gain.setValueAtTime(0, now);
                    g.gain.linearRampToValueAtTime(0.05, now + 5);
                    g.gain.linearRampToValueAtTime(0, now + 10);
                    setTimeout(sweep, 10000);
                };
                setTimeout(sweep, offset);
            };

            [200, 400, 800, 1600].forEach((f, i) => createDrone(f, i * 2500));
        }

        function triggerSurge() {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(Math.random() * 50, audioCtx.currentTime);
            g.gain.setValueAtTime(0.5, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            
            // Visual Strobe
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function render() {
            if(!active) return;
            timer++;

            // Kursor yang "hidup" (Autonomous Creep)
            if (Math.abs(mX - pX) < 1 && Math.abs(mY - pY) < 1) {
                mX += Math.sin(timer * 0.05) * 2;
                mY += Math.cos(timer * 0.05) * 2;
            }

            // Peluruhan Pixel (Organic Decay)
            const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const d = img.data;
            for(let i=0; i<d.length; i+=4) {
                d[i] *= 0.92;     // R
                d[i+1] *= 0.88;   // G
                d[i+2] *= 0.9;    // B
                if(Math.random() > 0.999) d[i] = 255; 
            }
            ctx.putImageData(img, 0, 0);

            // Menggambar Saraf Digital
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(pX, pY);
            ctx.lineTo(mX, mY);
            ctx.stroke();

            pX += (mX - pX) * 0.1;
            pY += (mY - pY) * 0.1;

            // Kejutan Malfungsi (Hang)
            if(timer % 500 === 0) {
                triggerSurge();
                // Subliminal
                ctx.fillStyle = "#fff";
                ctx.font = "20px serif";
                ctx.fillText("LIHAT KE BELAKANG", 10, 100);
            }

            requestAnimationFrame(render);
        }
    </script>
</body>
</html>
