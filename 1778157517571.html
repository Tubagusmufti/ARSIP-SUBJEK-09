<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I N A N G</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #030303; overflow: hidden; cursor: none;
            display: flex; justify-content: center; align-items: center;
        }

        #box {
            width: 100px; height: 100px; border: 1px solid #222;
            display: flex; justify-content: center; align-items: center;
            color: #111; font-family: monospace; font-size: 10px;
            transition: border 0.3s;
        }

        #fake-cursor {
            position: fixed; width: 6px; height: 6px;
            background: #fff; border-radius: 50%;
            pointer-events: none; z-index: 1000;
            box-shadow: 0 0 10px #fff;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 500;
            background: radial-gradient(circle, transparent 20%, #000 100%);
            opacity: 0.9;
        }

        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 2000; display: none;
        }
    </style>
</head>
<body>

    <div id="box">TETAP DI SINI</div>
    <div id="fake-cursor"></div>
    <div id="overlay"></div>
    <div id="flash"></div>

    <script>
        const box = document.getElementById('box');
        const cursor = document.getElementById('fake-cursor');
        const flash = document.getElementById('flash');
        
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let fakeX = mouseX;
        let fakeY = mouseY;
        let audioCtx;
        let state = 0; // 0: Normal, 1: Lag, 2: Inversion, 3: Attack

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            if(!audioCtx) initAudio();
        });

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 60;
            gain.gain.value = 0.05;
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
        }

        function playSnap() {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
            g.gain.setValueAtTime(0.2, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function update() {
            let dx = mouseX - fakeX;
            let dy = mouseY - fakeY;

            if (state === 0) { // Normal
                fakeX += dx * 0.2;
                fakeY += dy * 0.2;
                if (Math.random() > 0.99) state = 1;
            } 
            else if (state === 1) { // Lag Berat
                fakeX += dx * 0.02;
                fakeY += dy * 0.02;
                box.style.borderColor = "#400";
                if (Math.random() > 0.98) state = 2;
            }
            else if (state === 2) { // Inversi (Melawan)
                fakeX -= dx * 0.1;
                fakeY -= dy * 0.1;
                box.innerText = "JANGAN PERGI";
                box.style.color = "#500";
                if (Math.random() > 0.99) triggerAttack();
            }

            cursor.style.left = fakeX + 'px';
            cursor.style.top = fakeY + 'px';
            requestAnimationFrame(update);
        }

        function triggerAttack() {
            state = 3;
            playSnap();
            flash.style.display = 'block';
            
            // Jumpscare visual singkat (SVG Terdistorsi)
            document.body.innerHTML += `
                <div style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:3000; color:red; font-size:10vw; font-family:serif; font-weight:bold;">
                    KUTEMUKAN
                </div>
            `;

            setTimeout(() => {
                location.reload();
            }, 200);
        }

        update();
    </script>
</body>
</html>
